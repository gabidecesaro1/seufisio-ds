<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=ASAP:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; box-sizing: border-box; }
body { font-family: 'ASAP', sans-serif; background: #FAF3FF; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.grad-box { height: 80px; border-radius: 12px; display: flex; align-items: flex-end; padding: 10px 14px; }
.grad-label { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.9); }
.section-label { font-size: 11px; font-weight: 700; color: #6C398D; text-transform: uppercase; letter-spacing: 0.08em; }
.grafismo-box { border-radius: 12px; background: #fff; border: 1px solid rgba(108,57,141,0.15); padding: 16px; display: flex; align-items: center; gap: 16px; }
.gfx { position: relative; width: 100px; height: 70px; overflow: hidden; border-radius: 8px; background: #FAF3FF; }
.gfx img { position: absolute; width: 160%; opacity: 0.15; top: -20%; left: -20%; }
.gfx-outline img { opacity: 0; }
.gfx-desc { font-size: 12px; color: #888; line-height: 1.5; }
</style>
</head><body>

<div class="section-label">Grafismos permitidos</div>
<div class="grid">
  <div class="grad-box" style="background:linear-gradient(135deg,#FD6003,#6C398D)">
    <div class="grad-label">Degradê Principal</div>
  </div>
  <div class="grad-box" style="background:radial-gradient(ellipse at bottom left,#FD6003,#2D3145 70%)">
    <div class="grad-label">Degradê Escuro</div>
  </div>
  <div class="grad-box" style="background:#FD6003">
    <div class="grad-label">Sólido Laranja</div>
  </div>
  <div class="grad-box" style="background:#6C398D">
    <div class="grad-label">Sólido Roxo</div>
  </div>
</div>

<div class="section-label">Marca como grafismo</div>
<div class="grafismo-box">
  <div class="gfx">
    <img src="../assets/seufisio-icon.png" alt="">
    <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:#aaa">Opacidade 10–30%</div>
  </div>
  <div class="gfx-desc">O símbolo da marca pode ser usado como elemento decorativo em baixa opacidade (10–30%) sobre qualquer fundo da paleta.</div>
</div>

</body></html>

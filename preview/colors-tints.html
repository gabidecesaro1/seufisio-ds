<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=ASAP:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; box-sizing: border-box; }
body { font-family: 'ASAP', sans-serif; background: #fff; padding: 20px; }
.row { display: flex; gap: 8px; margin-bottom: 8px; }
.chip { flex: 1; height: 44px; border-radius: 8px; display: flex; align-items: flex-end; padding: 5px 8px; font-size: 10px; font-weight: 700; font-family: monospace; }
.label { font-size: 11px; font-weight: 700; color: #2D3145; margin-bottom: 6px; }
</style>
</head><body>
<div class="label">Orange tints</div>
<div class="row">
  <div class="chip" style="background:rgba(253,96,3,0.10); color:#FD6003;">10%</div>
  <div class="chip" style="background:rgba(253,96,3,0.20); color:#FD6003;">20%</div>
  <div class="chip" style="background:rgba(253,96,3,0.40); color:#fff;">40%</div>
  <div class="chip" style="background:rgba(253,96,3,0.70); color:#fff;">70%</div>
  <div class="chip" style="background:#FD6003; color:#fff;">100%</div>
</div>
<div class="label">Purple tints</div>
<div class="row">
  <div class="chip" style="background:rgba(108,57,141,0.10); color:#6C398D;">10%</div>
  <div class="chip" style="background:rgba(108,57,141,0.20); color:#6C398D;">20%</div>
  <div class="chip" style="background:rgba(108,57,141,0.40); color:#fff;">40%</div>
  <div class="chip" style="background:rgba(108,57,141,0.70); color:#fff;">70%</div>
  <div class="chip" style="background:#6C398D; color:#fff;">100%</div>
</div>
</body></html>

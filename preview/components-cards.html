<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=ASAP:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; box-sizing: border-box; }
body { font-family: 'ASAP', sans-serif; background: #FAF3FF; padding: 20px; display: flex; gap: 16px; flex-wrap: wrap; }
.card { border-radius: 14px; padding: 20px; flex: 1; min-width: 180px; }
.card-title { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
.card-body { font-size: 13px; line-height: 1.5; }
.tag { display: inline-block; border-radius: 100px; padding: 3px 10px; font-size: 11px; font-weight: 700; margin-bottom: 10px; }
</style>
</head><body>

<div class="card" style="background:#fff;border:1px solid rgba(108,57,141,0.18);box-shadow:0 2px 10px rgba(45,49,69,0.08)">
  <div class="tag" style="background:rgba(253,96,3,0.12);color:#FD6003">Agendamento</div>
  <div class="card-title" style="color:#2D3145">Agenda Online</div>
  <div class="card-body" style="color:#666">Organize seus atendimentos com calendário visual e lembretes automáticos.</div>
</div>

<div class="card" style="background:#2D3145;border:none;box-shadow:0 4px 20px rgba(45,49,69,0.2)">
  <div class="tag" style="background:rgba(253,96,3,0.25);color:#FD6003">Destaque</div>
  <div class="card-title" style="color:#fff">Gestão Financeira</div>
  <div class="card-body" style="color:rgba(255,255,255,0.7)">Controle receitas, despesas e emita cobranças automáticas para seus alunos.</div>
</div>

<div class="card" style="background:linear-gradient(135deg,#FD6003,#6C398D);border:none;">
  <div class="tag" style="background:rgba(255,255,255,0.2);color:#fff">Premium</div>
  <div class="card-title" style="color:#fff">Relatórios</div>
  <div class="card-body" style="color:rgba(255,255,255,0.85)">Acompanhe indicadores de crescimento e tome decisões baseadas em dados.</div>
</div>

</body></html>

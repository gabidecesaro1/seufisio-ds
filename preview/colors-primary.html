<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=ASAP:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; box-sizing: border-box; }
body { font-family: 'ASAP', sans-serif; background: #fff; padding: 20px; display: flex; gap: 16px; }
.swatch { border-radius: 10px; overflow: hidden; flex: 1; }
.color-block { height: 90px; }
.info { padding: 10px 12px; }
.hex { font-size: 13px; font-weight: 700; color: #2D3145; }
.name { font-size: 11px; color: #888; margin-top: 2px; }
.token { font-size: 10px; color: #aaa; font-family: monospace; margin-top: 2px; }
.border { border: 1px solid #e5e5e5; }
</style>
</head><body>
<div class="swatch border">
  <div class="color-block" style="background:#FD6003"></div>
  <div class="info"><div class="hex">#FD6003</div><div class="name">Orange</div><div class="token">--color-orange</div></div>
</div>
<div class="swatch border">
  <div class="color-block" style="background:#6C398D"></div>
  <div class="info"><div class="hex">#6C398D</div><div class="name">Purple</div><div class="token">--color-purple</div></div>
</div>
<div class="swatch border">
  <div class="color-block" style="background:#2D3145"></div>
  <div class="info"><div class="hex">#2D3145</div><div class="name">Navy</div><div class="token">--color-navy</div></div>
</div>
<div class="swatch border">
  <div class="color-block" style="background:#fff; border-bottom: 1px solid #e5e5e5;"></div>
  <div class="info"><div class="hex">#FFFFFF</div><div class="name">White</div><div class="token">--color-white</div></div>
</div>
</body></html>

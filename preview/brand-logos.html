<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=ASAP:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; box-sizing: border-box; }
body { font-family: 'ASAP', sans-serif; background: #FAF3FF; padding: 24px; display: flex; flex-direction: column; gap: 20px; }
.row { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
.logo-box { border-radius: 12px; display: flex; align-items: center; justify-content: center; padding: 20px 24px; }
img { display: block; max-height: 48px; width: auto; }
.label { font-size: 11px; color: #888; margin-top: 6px; text-align: center; font-family: monospace; }
.item { display: flex; flex-direction: column; align-items: center; }
</style>
</head><body>

<div class="row">
  <div class="item">
    <div class="logo-box" style="background:#fff;border:1px solid rgba(108,57,141,0.15)">
      <img src="../assets/seufisio-horizon.png" alt="logo horizon color">
    </div>
    <div class="label">Horizontal · Color</div>
  </div>
  <div class="item">
    <div class="logo-box" style="background:#2D3145">
      <img src="../assets/seufisio-white-horizon.png" alt="logo horizon white">
    </div>
    <div class="label">Horizontal · White</div>
  </div>
  <div class="item">
    <div class="logo-box" style="background:#fff;border:1px solid rgba(108,57,141,0.15)">
      <img src="../assets/seufisio-black-horizon.png" alt="logo horizon dark">
    </div>
    <div class="label">Horizontal · Dark</div>
  </div>
</div>

<div class="row">
  <div class="item">
    <div class="logo-box" style="background:#fff;border:1px solid rgba(108,57,141,0.15);width:80px;height:80px;">
      <img src="../assets/seufisio-icon.png" alt="icon color" style="max-height:52px">
    </div>
    <div class="label">Icon · Color</div>
  </div>
  <div class="item">
    <div class="logo-box" style="background:#2D3145;width:80px;height:80px;">
      <img src="../assets/seufisio-white-icon.png" alt="icon white" style="max-height:52px">
    </div>
    <div class="label">Icon · White</div>
  </div>
</div>

</body></html>
